name: Upgrade python and pre-commit dependencies

on:
  workflow_dispatch:
  push:
    branches:
      - dev
  schedule:
    - cron: "0 0 * * *"

jobs:
  upgrader:
    if: ${{ !(contains(github.event.head_commit.message, 'Merge pull request')) }}
    name: Upgrade dependencies
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        ref: dev

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - uses: actions/cache@v5
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
        restore-keys: pre-commit-

    - name: Upgrade lockfile, re-export requirements, and pre-commit autoupdate
      run: |
        uv lock --upgrade
        uv export --no-hashes --no-emit-project -o requirements.txt
        uv sync
        uv run pre-commit autoupdate
        uv run pre-commit run --all-files --color always

    - uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: ":arrow_up: Upgrade dependencies"
        branch: dev
        commit_user_name: Upgrader
        commit_user_email: sadikkuzu@hotmail.com
        commit_author: Upgrader <sadikkuzu@hotmail.com>
